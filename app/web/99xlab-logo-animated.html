<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>99xlab — animated mark</title>
<script>
  (function(){
    if (!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches))
      document.documentElement.classList.add('boot');
  })();
</script>
<style>
  :root{--paper:#FFFFFF;--ink:#0A0A09;
        --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);min-height:100vh;
       display:grid;place-items:center;cursor:pointer;
       font-family:-apple-system,'Helvetica Neue',Arial,sans-serif}
  .wrap{width:min(34rem,84vw)}
  .wordmark{display:block;width:100%;height:auto;overflow:visible}
  .stk{stroke-dasharray:var(--len)}
  .counter{margin-top:1.2rem;font-family:var(--mono);font-size:clamp(.95rem,2.6vw,1.15rem);
           letter-spacing:.04em;font-variant-numeric:tabular-nums;min-height:1.4em}
  .caret{display:inline-block;width:.55ch;height:1em;margin-left:.15ch;background:var(--ink);
         vertical-align:-.12em;animation:blink 1.1s steps(2,start) infinite}
  @keyframes blink{to{visibility:hidden}}

  html.boot .r1{transform-origin:52px 42px;
    animation:rollIn .82s cubic-bezier(.2,.74,.24,1) .15s both,
              gapClose .3s ease-out .88s both}
  @keyframes rollIn{from{transform:translateX(-118px) rotate(-450deg)}
                    to{transform:translateX(0) rotate(0deg)}}
  @keyframes gapClose{from{stroke-dashoffset:39.3}to{stroke-dashoffset:0}}
  html.boot .stk.d{animation:draw var(--dur,.26s) ease-out var(--dly,1s) both}
  @keyframes draw{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:0}}

  @media (prefers-reduced-motion:reduce){
    .caret{animation:none}
    html.boot .r1,html.boot .stk.d{animation:none}
  }
</style>
</head>
<body title="click to replay">
<div class="wrap">
  <svg class="wordmark" viewBox="0 0 465 120" aria-label="99xlab" role="img" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#0A0A09" stroke-width="14">
      <circle class="stk r1" style="--len:157.08" cx="52" cy="42" r="25"/>
      <line   class="stk d" style="--len:68;--dur:.26s;--dly:.98s"  x1="77"  y1="42" x2="77"  y2="110"/>
      <circle class="stk d" style="--len:157.08;--dur:.36s;--dly:1.1s" cx="134" cy="42" r="25"/>
      <line   class="stk d" style="--len:68;--dur:.26s;--dly:1.32s" x1="159" y1="42" x2="159" y2="110"/>
      <line   class="stk d" style="--len:83.8;--dur:.2s;--dly:1.46s" x1="184" y1="40" x2="230" y2="110"/>
      <line   class="stk d" style="--len:83.8;--dur:.2s;--dly:1.58s" x1="230" y1="40" x2="184" y2="110"/>
      <line   class="stk d" style="--len:100;--dur:.22s;--dly:1.7s"  x1="255" y1="10" x2="255" y2="110"/>
      <circle class="stk d" style="--len:175.93;--dur:.34s;--dly:1.8s" cx="315" cy="75" r="28"/>
      <line   class="stk d" style="--len:70;--dur:.22s;--dly:2.02s" x1="343" y1="40" x2="343" y2="110"/>
      <line   class="stk d" style="--len:100;--dur:.22s;--dly:2.12s" x1="375" y1="10" x2="375" y2="110"/>
      <circle class="stk d" style="--len:175.93;--dur:.34s;--dly:2.2s" cx="410" cy="75" r="28"/>
    </g>
  </svg>
  <div class="counter" aria-hidden="true"><span id="nines"></span><span class="caret" id="caret"></span></div>
</div>

<script>
(function(){
  var root=document.documentElement, el=document.getElementById('nines'),
      caret=document.getElementById('caret');
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var pending=[], IGNITE=2650, MAX=12;
  function later(fn,ms){pending.push(setTimeout(fn,ms))}
  function clearAll(){while(pending.length)clearTimeout(pending.pop())}
  var n, delay;
  function frame(){ n++;
    el.textContent='99.'+Array(n+1).join('9');
    if(n>=MAX){later(reset,2100)} else {delay=Math.max(90,delay*0.84);later(frame,delay)}
  }
  function reset(){n=1;delay=620;el.textContent='99.9';later(frame,900)}
  function start(){
    if(reduced){el.textContent='99.999\u2026';if(caret)caret.style.display='none';return}
    el.textContent=''; later(reset,IGNITE);
  }
  function replay(){
    if(reduced)return;
    clearAll();
    root.classList.remove('boot'); void document.body.offsetWidth;
    root.classList.add('boot');
    el.textContent=''; later(reset,IGNITE);
  }
  document.body.addEventListener('click',replay);
  start();
})();
</script>
</body>
</html>
